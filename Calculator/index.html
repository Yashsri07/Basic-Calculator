<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="Stylesheet" href="site.css">
</head>
<body>
    <div class="calculator">
        <h1> Calculator </h1>
        <div class="calculator-body">
            <input type="text" id="display" readonly placeholder="0">
            <div class="buttons">
                <div class="button-row"><button type="button" class="number">1</button><button type="button" class="number">2</button><button type="button" class="number">3</button><button type="button" class="delete">⌫</button></div>
                <div class="button-row"><button type="button" class="number">4</button><button type="button" class="number">5</button><button type="button" class="number">6</button><button type="button" class="operator">+</button></div>
                <div class="button-row"><button type="button" class="number">7</button><button type="button" class="number">8</button><button type="button" class="number">9</button><button type="button" class="operator">-</button></div>
                <div class="button-row"><button type="button" class="operator">/</button><button type="button" class="number">0</button><button type="button" class="operator">X</button><button type="button" class="equals">=</button></div>
            </div>
        </div>
    </div>
</body>
<script src="site.js"></script>
</html>
